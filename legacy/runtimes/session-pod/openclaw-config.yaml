# OpenClaw config for session pod
# Filled with real endpoints 2026-04-13

agents:
  defaults:
    model: openai/default
    workspace: /workspace

providers:
  openai:
    api_base: "http://litellm.inference.svc.cluster.local:4000/v1"
    api_key: "none"

channels:
  telegram:
    token: "${TELEGRAM_BOT_TOKEN}"
    mode: polling

tools:
  exec:
    enabled: true
    shell: /bin/bash
  file:
    enabled: true
    workspace: /workspace
