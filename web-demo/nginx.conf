server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic hardening applied server-wide; nginx's add_header inheritance is
  # replace-not-merge, so every location that sets its own add_header below
  # must re-declare these.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache static assets aggressively; HTML is always fresh so deploys take effect.
  location = /index.html {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-store" always;
  }

  location ~* \.(js|css|svg|png|jpg|jpeg|gif|woff2?)$ {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
