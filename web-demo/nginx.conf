server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic hardening applied server-wide; nginx's add_header inheritance is
  # replace-not-merge, so every location that sets its own add_header below
  # must re-declare these.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache static assets aggressively; HTML is always fresh so deploys take effect.
  location = /index.html {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-store" always;
  }

  location ~* \.(js|css|svg|png|jpg|jpeg|gif|woff2?)$ {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  # Live demo backends. The hostnames resolve only when running inside the
  # docker-compose network; in static-only deployments these locations return
  # 502 and the web UI falls back to the scenario-driven simulation.
  location = /api/health {
    proxy_pass http://control-plane:8080/health;
    proxy_set_header Host $host;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
  }

  location = /api/ready {
    proxy_pass http://control-plane:8080/ready;
    proxy_set_header Host $host;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
  }

  location = /api/offload {
    proxy_pass http://control-plane:8080/offload;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
  }

  location ~ ^/api/offload/(?<job_id>[A-Za-z0-9._-]+)$ {
    proxy_pass http://control-plane:8080/offload/$job_id;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }

  # Presigned-URL relay for artifact-backed responses (responses too large
  # for the worker's inline cutoff). The control-plane returns
  # {ref, url, expires_in}; the browser then fetches `url` directly from
  # MinIO. The artifact ref shape is `offload/<session>/<task>.json` — we
  # accept slashes and dots in the path segment but reject `..` traversal
  # at the control-plane.
  location ~ ^/api/artifacts/(?<artifact_ref>[A-Za-z0-9._/-]+)$ {
    proxy_pass http://control-plane:8080/artifacts/$artifact_ref;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  # Honest dependency probes used by the "Platform health" rail. Each one
  # returns {state: "ok"|"down"|"unconfigured"}; the UI translates that into
  # a dot color. Names are restricted to the targets the control plane
  # configures (openclaw, litellm, sambanova) — anything else 404s.
  location ~ ^/api/probe/(?<probe_name>[a-z][a-z0-9_-]+)$ {
    proxy_pass http://control-plane:8080/probe/$probe_name;
    proxy_set_header Host $host;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
