# Optional overlay that adds Flowise as an alternate orchestrator alongside
# the base docker-compose.yaml stack, plus the LiteLLM gateway it depends on
# and a one-shot seeder that wires the credentials/variables Flowise needs
# to reach LiteLLM and the control plane.
#
#   eval "$(scripts/lib/load-versions.sh)"            # pin LITELLM_IMAGE
#   docker compose -f docker-compose.yaml \
#                  -f docker-compose.flowise.yaml up --build
#   open http://localhost:3000   # Flowise UI (login with FLOWISE_USERNAME/PASSWORD)
#
# Flowise is positioned as an optional alt to OpenClaw for users who want a
# visual flow-builder front-end. It calls the same LiteLLM gateway and the
# same control-plane offload/artifact endpoints, so flows are portable
# between this single-host bring-up and the k8s deploy.
#
# Model layer:
#   Compose-mode now ships a LiteLLM service. Its default `default` /
#   `reasoning` aliases use LiteLLM's built-in `mock_response`, so the demo
#   boots with zero cloud credentials — Flowise can call the gateway and get
#   a deterministic canned reply, exercising the wire end-to-end. Set
#   AWS_BEARER_TOKEN_BEDROCK / SAMBANOVA_API_KEY / OPENAI_API_KEY in .env to
#   activate the real provider entries declared in
#   config/model-routing/litellm-compose.yaml.
#
# Defaults:
#   - Auth is REQUIRED. The container will not start unless FLOWISE_USERNAME
#     and FLOWISE_PASSWORD are set (see .env or shell). Demo defaults exist
#     in the variables below but should not be reused in shared environments.
#   - Persistence: a named volume (flowise-data) holds the sqlite DB and any
#     uploaded credentials/flows. Delete the volume to reset.
#   - Network: shares the compose default network so it can reach
#     control-plane:8080 by service name. The host port is bound to
#     127.0.0.1 only — do not publish to the LAN without changing the auth
#     defaults and disabling DEBUG.

services:
  litellm:
    # Pinned via LITELLM_IMAGE so config/versions.yaml stays the single
    # source of truth. Run `eval "$(scripts/lib/load-versions.sh)"` before
    # `docker compose up` to rehydrate from versions.yaml.
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-v1.63.11-stable}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # Optional cloud-provider credentials. Empty defaults keep the
      # corresponding model entries in litellm-compose.yaml inert; the
      # `default` / `reasoning` mock entries answer regardless so the demo
      # boots without any keys.
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Master key gates the LiteLLM admin API (/ui, /key/*). Leave empty in
      # the demo so any non-empty client key works against /v1/* — matches
      # the k8s deploy's posture.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
    volumes:
      - ./config/model-routing/litellm-compose.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      # /health/liveliness is the upstream-supported path; /health/readiness
      # would require all backends to answer (Bedrock/SambaNova rejected
      # without keys would mark the proxy unhealthy on a clean boot).
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:4000/health/liveliness\",timeout=2).status==200 else sys.exit(1)'"]
      interval: 5s
      timeout: 3s
      retries: 24

  flowise:
    image: flowiseai/flowise:2.2.7
    depends_on:
      control-plane:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      # Auth (required). These are injected from the shell / .env; the
      # placeholders below intentionally fail fast if unset.
      FLOWISE_USERNAME: ${FLOWISE_USERNAME:?set FLOWISE_USERNAME in .env}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD:?set FLOWISE_PASSWORD in .env}

      # Persistence — sqlite under /root/.flowise (mounted to volume below).
      DATABASE_PATH: /root/.flowise
      APIKEY_PATH: /root/.flowise
      SECRETKEY_PATH: /root/.flowise
      LOG_PATH: /root/.flowise/logs
      BLOB_STORAGE_PATH: /root/.flowise/storage

      # Encryption key for stored credentials. Generate once and pin in .env.
      FLOWISE_SECRETKEY_OVERWRITE: ${FLOWISE_SECRETKEY_OVERWRITE:?set FLOWISE_SECRETKEY_OVERWRITE in .env}

      # Wire flows at the openai-compatible LiteLLM gateway. The default
      # value resolves to the in-compose `litellm` service above; override
      # to point flows at a remote LiteLLM (e.g. the k8s NodePort) without
      # editing the compose file.
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-demo-not-a-real-key}

      # Endpoints that flow nodes can call for offload / artifact retrieval.
      CONTROL_PLANE_BASE_URL: http://control-plane:8080

      # Disable telemetry and debug noise by default.
      DISABLE_FLOWISE_TELEMETRY: "true"
      DEBUG: "false"
    volumes:
      - flowise-data:/root/.flowise
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  flowise-seed:
    # One-shot. Waits for Flowise to answer, then idempotently creates the
    # `litellm-openai` credential and the `LITELLM_BASE_URL` /
    # `CONTROL_PLANE_BASE_URL` Variables that every flow under
    # config/flowise/flows/*.md expects. The chatflow itself is still built
    # in the UI per the spec — see scripts/flowise/seed.py for the rationale.
    image: python:3.12-alpine
    depends_on:
      flowise:
        condition: service_healthy
    environment:
      FLOWISE_BASE_URL: http://flowise:3000
      FLOWISE_USERNAME: ${FLOWISE_USERNAME:?set FLOWISE_USERNAME in .env}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD:?set FLOWISE_PASSWORD in .env}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-demo-not-a-real-key}
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
    volumes:
      # Read-only mount of the seed script. Stdlib-only Python keeps the
      # seed image at a stock python:alpine with no `pip install` step.
      - ./scripts/flowise:/scripts:ro
    entrypoint: ["python", "/scripts/seed.py"]
    restart: "no"

volumes:
  flowise-data:
