# Single-host bring-up for the demo on a laptop.
#
#   docker compose up --build
#   open http://localhost:8080  -> "Run walkthrough" calls real backends.
#
# Stack:
#   minio          (S3-compatible artifact store)
#   minio-init     (one-shot: create the demo-artifacts bucket)
#   agent-stub     (local stand-in for the OpenClaw gateway: /tools/invoke)
#   offload-worker (System B: executes shell/echo/pandas/sklearn/agent_invoke)
#   control-plane  (System A: forwards to offload-worker, presigns artifacts)
#   web-demo       (nginx static UI + reverse proxy to control-plane on /api/*)
#
# This compose path is independent of the operator-managed Kubernetes path —
# `agent_invoke` here forwards to the local agent-stub instead of a real
# OpenClaw instance, so the "agent ran a command" path is exercised
# end-to-end without external dependencies. To target a remote OpenClaw
# instead, set OPENCLAW_GATEWAY_URL/_TOKEN before `compose up`.

services:
  minio:
    # Pinned via env interpolation so config/versions.yaml stays the single
    # source of truth. Default matches what the demo has shipped with;
    # `eval "$(scripts/lib/load-versions.sh)"` before `docker compose up`
    # rehydrates from versions.yaml. CI / per-env overrides via shell still
    # win — the default only fires when MINIO_IMAGE is unset/empty.
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z}
    command: server /data --address :9000 --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
    ports:
      # Bind to localhost — these are demo creds, but we still don't want the
      # bucket to be reachable from other hosts on a shared network.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    # No healthcheck on the server: tools like `curl` and `mc` aren't reliably
    # present in the minio server image, and `mc ready` requires an alias that
    # only minio-init configures. Readiness is gated by minio-init below
    # (which retries until the cluster answers and the bucket exists), and
    # downstream services depend on minio-init's completion.
    volumes:
      - minio-data:/data

  minio-init:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z}
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        # Wait for MinIO to serve, then create the bucket. `mc alias set`
        # validates network reachability at alias time, so it must be inside
        # the retry loop — on a cold start MinIO isn't listening yet and a
        # single pre-loop `mc alias set` would hard-fail the container.
        for i in $$(seq 1 60); do
          if mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1 \
             && mc ready local >/dev/null 2>&1; then
            break
          fi
          echo "[minio-init] waiting for minio (attempt $$i)..."
          sleep 2
        done
        mc ready local
        mc mb --ignore-existing local/demo-artifacts
        echo "[minio-init] bucket demo-artifacts ready"
    restart: "no"

  agent-stub:
    build:
      context: ./runtimes/agent-stub
    volumes:
      # Read-only workspace for the agent's read_file/list_files tools. The
      # stub never writes to /workspace; mounting ro makes that explicit.
      - ./demo-workspace:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=2).status==200 else sys.exit(1)'"]
      interval: 5s
      timeout: 3s
      retries: 12

  offload-worker:
    build:
      context: ./runtimes/offload-worker
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
      MINIO_BUCKET: demo-artifacts
      SCENARIO_SCRIPTS_DIR: /scenarios
      # Default points at the in-compose agent-stub so `agent_invoke` works
      # locally end-to-end. Override OPENCLAW_GATEWAY_URL in your shell
      # before `compose up` to target a remote OpenClaw instance instead.
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://agent-stub:8080}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      # Mount scenarios read-only so the worker container cannot rewrite the
      # allow-listed scripts at runtime.
      - ./agents/scenarios:/scenarios:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
      agent-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=2).status==200 else sys.exit(1)'"]
      interval: 5s
      timeout: 3s
      retries: 12

  control-plane:
    build:
      context: ./runtimes/control-plane
    environment:
      OFFLOAD_WORKER_URL: http://offload-worker:8080
      OFFLOAD_TIMEOUT_SECONDS: "120"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
      MINIO_BUCKET: demo-artifacts
      # Probe targets for the "Platform health" rail. The agent-stub stands
      # in for OpenClaw locally, so its /health is the closest honest signal.
      # LiteLLM / SambaNova probes stay unset by default (UI shows "unwired"
      # rather than misreporting OK) and can be turned on by setting
      # LITELLM_BASE_URL / SAMBANOVA_PROBE_URL in your shell before
      # `compose up`.
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://agent-stub:8080}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      SAMBANOVA_PROBE_URL: ${SAMBANOVA_PROBE_URL:-}
      # Durable registry paths — the volume below maps to /var/lib/control-plane
      # so a compose restart preserves issued result_refs and the
      # /sessions table. Use Compose's ${VAR:-default} interpolation so a
      # shell override (e.g. JOBS_DB_PATH=:memory: docker compose up)
      # actually reaches the container; a hard-coded value would silently
      # ignore the shell.
      JOBS_DB_PATH: ${JOBS_DB_PATH:-/var/lib/control-plane/jobs.db}
      SESSIONS_DB_PATH: ${SESSIONS_DB_PATH:-/var/lib/control-plane/sessions.db}
      # Long-lived agent registry seed. The image bakes a default path
      # at /etc/control-plane/agents.yaml; mount the in-tree file there
      # so a fresh `compose up` shows the four default agents in GET
      # /agents (and the new "Agents (long-lived)" UI panel).
      AGENT_REGISTRY_PATH: /etc/control-plane/agents.yaml
    volumes:
      - control-plane-data:/var/lib/control-plane
      - ./config/agents.yaml:/etc/control-plane/agents.yaml:ro
    depends_on:
      offload-worker:
        condition: service_healthy
    ports:
      # Expose for ad-hoc debugging (curl http://localhost:8090/health). The
      # web UI goes through nginx /api/* instead.
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=2).status==200 else sys.exit(1)'"]
      interval: 5s
      timeout: 3s
      retries: 12

  web-demo:
    build:
      context: ./web-demo
    depends_on:
      control-plane:
        condition: service_healthy
    ports:
      # The web UI is the only service intended to be reachable from the host
      # browser; bind to localhost so it isn't published to the LAN by default.
      - "127.0.0.1:8080:8080"

  # Optional visual surfaces (Flowise, OpenWebUI) live in overlay files —
  # see docker-compose.flowise.yaml and docker-compose.openwebui.yaml. The
  # web demo's "Service launchers" panel auto-detects whichever ones happen
  # to be running and hides the rest.

volumes:
  minio-data:
  control-plane-data:
