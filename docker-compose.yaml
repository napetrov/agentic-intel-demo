# Single-host bring-up for the demo on a laptop.
#
#   docker compose up --build
#   open http://localhost:8080  -> "Run walkthrough" calls real backends.
#
# Stack:
#   minio          (S3-compatible artifact store)
#   minio-init     (one-shot: create the demo-artifacts bucket)
#   offload-worker (System B: executes shell/echo/pandas/sklearn/agent_invoke)
#   control-plane  (System A: forwards to offload-worker, presigns artifacts)
#   web-demo       (nginx static UI + reverse proxy to control-plane on /api/*)
#
# This compose path is independent of the operator-managed Kubernetes path —
# `agent_invoke` is left unconfigured here (no OpenClaw running locally) and
# returns an "unconfigured" error if invoked. The web UI uses `task_type=shell`
# end-to-end, which is fully self-contained.

services:
  minio:
    image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --address :9000 --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
    ports:
      # Bind to localhost — these are demo creds, but we still don't want the
      # bucket to be reachable from other hosts on a shared network.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    # No healthcheck on the server: tools like `curl` and `mc` aren't reliably
    # present in the minio server image, and `mc ready` requires an alias that
    # only minio-init configures. Readiness is gated by minio-init below
    # (which retries until the cluster answers and the bucket exists), and
    # downstream services depend on minio-init's completion.
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        # Wait for MinIO to serve, then create the bucket. `mc alias set`
        # validates network reachability at alias time, so it must be inside
        # the retry loop — on a cold start MinIO isn't listening yet and a
        # single pre-loop `mc alias set` would hard-fail the container.
        for i in $$(seq 1 60); do
          if mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1 \
             && mc ready local >/dev/null 2>&1; then
            break
          fi
          echo "[minio-init] waiting for minio (attempt $$i)..."
          sleep 2
        done
        mc ready local
        mc mb --ignore-existing local/demo-artifacts
        echo "[minio-init] bucket demo-artifacts ready"
    restart: "no"

  offload-worker:
    build:
      context: ./runtimes/offload-worker
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
      MINIO_BUCKET: demo-artifacts
      SCENARIO_SCRIPTS_DIR: /scenarios
      # Leave OPENCLAW_GATEWAY_URL empty — agent_invoke will return a
      # configuration error here. Set OPENCLAW_GATEWAY_URL/_TOKEN in your
      # shell before `compose up` to enable it against a remote OpenClaw.
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      # Mount scenarios read-only so the worker container cannot rewrite the
      # allow-listed scripts at runtime.
      - ./agents/scenarios:/scenarios:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=2).status==200 else sys.exit(1)'"]
      interval: 5s
      timeout: 3s
      retries: 12

  control-plane:
    build:
      context: ./runtimes/control-plane
    environment:
      OFFLOAD_WORKER_URL: http://offload-worker:8080
      OFFLOAD_TIMEOUT_SECONDS: "120"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio-dummy-secret-1234}
      MINIO_BUCKET: demo-artifacts
    depends_on:
      offload-worker:
        condition: service_healthy
    ports:
      # Expose for ad-hoc debugging (curl http://localhost:8090/health). The
      # web UI goes through nginx /api/* instead.
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=2).status==200 else sys.exit(1)'"]
      interval: 5s
      timeout: 3s
      retries: 12

  web-demo:
    build:
      context: ./web-demo
    depends_on:
      control-plane:
        condition: service_healthy
    ports:
      # The web UI is the only service intended to be reachable from the host
      # browser; bind to localhost so it isn't published to the LAN by default.
      - "127.0.0.1:8080:8080"

volumes:
  minio-data:
