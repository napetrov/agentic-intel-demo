# Component and model version pins for the demo.
#
# Authoritative source for versions referenced in scripts and documentation.
# When bumping, update the matching k8s manifest / Dockerfile / setup
# script in the same change.

components:
  # Patch pin for k3s — change deliberately; floating "v1.31.x" caused
  # downstream version drift before.
  k3s: "v1.31.4+k3s1"
  # vLLM helm chart lives in an external repo; pass CHART_REPO/CHART_REF
  # to scripts/setup-system-b-vllm-local.sh to pin per environment.
  vllm_chart_path: "core/helm-charts/vllm"
  litellm_image: "ghcr.io/berriai/litellm:main-v1.63.11-stable"
  minio_image: "minio/minio:RELEASE.2025-02-28T09-55-16Z"
  python_base: "3.12-slim"
  node_base: "22-slim"

models:
  # System B local SLM (canonical, served by vLLM)
  local_slm:
    id: "Qwen/Qwen3-4B-Instruct-2507"
    context_length: 32768
    cpu_profile: "16 CPU / 32Gi"
  # Cloud reasoning fallback (via Bedrock)
  cloud_reasoning:
    id: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    via: "amazon-bedrock"
  # SambaNova-served reasoning model
  cloud_alt:
    id: "DeepSeek-V3.1"
    via: "sambanova"

# LiteLLM model_name aliases that the rest of the stack depends on.
# Defined in k8s/system-a/litellm.yaml's `litellm-config` ConfigMap.
litellm_aliases:
  fast: "openai/Qwen/Qwen3-4B-Instruct-2507 (vLLM)"
  default: "openai/Qwen/Qwen3-4B-Instruct-2507 (vLLM, longer timeout)"
  reasoning: "bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  sambanova: "sambanova/DeepSeek-V3.1"

# Operator (consumed by scripts/install-openclaw-operator.sh).
# Both ref and image come from an upstream project we don't own — they
# are intentionally NOT pinned here. Pin them in your environment via
# OPENCLAW_OPERATOR_REF and the OpenClawInstance.spec.image field
# respectively. Tracked as gaps #1 and #4 in
# docs/operator-gap-analysis.md.
operator:
  repo: "https://github.com/openclaw-rocks/openclaw-operator.git"
  ref: "main"
  image: "ghcr.io/openclaw-rocks/openclaw:latest"
