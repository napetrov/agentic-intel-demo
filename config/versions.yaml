# Component and model version references for the demo.
#
# Mixed-mode file:
# - Entries consumed at runtime (via scripts/lib/load-versions.sh):
#     operator.ref, operator.image,
#     components.compose_minio_image, components.compose_minio_mc_image,
#     components.litellm_image, components.minio_image, components.k3s.
# - Everything else (models.*, litellm_aliases.*, vllm_chart_path,
#   python_base, node_base, operator_ready.*) is documentation only —
#   manifests / scripts pin those values inline. Keep the file in sync with
#   the matching k8s manifest / Dockerfile / setup script when bumping;
#   drift is a bug worth fixing.

components:
  # Patch pin for k3s — change deliberately; floating "v1.31.x" caused
  # downstream version drift before.
  k3s: "v1.31.4+k3s1"
  # vLLM helm chart lives in an external repo; pass CHART_REPO/CHART_REF
  # to scripts/setup-system-b-vllm-local.sh to pin per environment.
  vllm_chart_path: "core/helm-charts/vllm"
  litellm_image: "ghcr.io/berriai/litellm:main-v1.63.11-stable"
  # k8s/system-b/minio.yaml uses the docker.io image at this tag.
  minio_image: "minio/minio:RELEASE.2025-02-28T09-55-16Z"
  # docker-compose.yaml pins quay.io images at older tags that have stayed
  # stable for the local-dev path. They're separate keys so bumping one
  # doesn't drag the other along — the two paths have different stability
  # requirements. Both are consumed via ${MINIO_IMAGE} / ${MINIO_MC_IMAGE}
  # interpolation in docker-compose.yaml; load via:
  #   eval "$(scripts/lib/load-versions.sh)" && docker compose up
  compose_minio_image: "quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z"
  compose_minio_mc_image: "quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z"
  python_base: "3.12-slim"
  node_base: "22-slim"

models:
  # System B local SLM (canonical, served by vLLM)
  local_slm:
    id: "Qwen/Qwen3-4B-Instruct-2507"
    context_length: 32768
    cpu_profile: "16 CPU / 32Gi"
  # Cloud reasoning fallback (via Bedrock)
  cloud_reasoning:
    id: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    via: "amazon-bedrock"
  # SambaNova-served reasoning model
  cloud_alt:
    id: "DeepSeek-V3.1"
    via: "sambanova"

# LiteLLM model_name aliases that the rest of the stack depends on.
# Defined in k8s/system-a/litellm.yaml's `litellm-config` ConfigMap.
litellm_aliases:
  fast: "openai/Qwen/Qwen3-4B-Instruct-2507 (vLLM)"
  default: "openai/Qwen/Qwen3-4B-Instruct-2507 (vLLM, longer timeout)"
  reasoning: "bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  sambanova: "sambanova/DeepSeek-V3.1"

# Operator reference values (documentation only).
# scripts/install-openclaw-operator.sh reads OPENCLAW_OPERATOR_REPO /
# OPENCLAW_OPERATOR_REF from the environment at install time; it does
# not parse this file. Both ref and image come from an upstream project
# we don't own — pin them in your environment via OPENCLAW_OPERATOR_REF
# and via the OpenClawInstance.spec.image field in
# examples/openclawinstance-intel-demo.yaml. Tracked as gaps #1 and #4
# in docs/operator-gap-analysis.md.
operator:
  repo: "https://github.com/openclaw-rocks/openclaw-operator.git"
  # Candidate pin — latest upstream release as of the most recent
  # `scripts/install-openclaw-operator.sh` default bump. Re-validate on
  # your stand before promoting; set OPENCLAW_OPERATOR_REF_VERIFIED=1
  # in the install env to silence the "candidate ref" notice once you've
  # confirmed the bump.
  ref: "v0.30.0"
  # Operator runtime image (consumed by examples/openclawinstance-intel-demo.yaml
  # as spec.image.tag). Published independently from the operator binary;
  # the tag here mirrors `ref` only by convention.
  image: "ghcr.io/openclaw-rocks/openclaw:v0.30.0"
# Canonical Ready phase the upstream controller emits while an
# OpenClawInstance is healthy. Surfaced here so scripts/smoke-test-operator-instance.sh
# and docs/operator-gap-analysis.md gap #5 share a single source of truth.
operator_ready:
  phase: "Running"
  jsonpath: "{.status.phase}"
