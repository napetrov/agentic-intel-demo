name: publish-agent-stub

# Build and publish runtimes/agent-stub as a container image to GHCR.
# The image is referenced by k8s/system-b/agent-stub.yaml as
# ghcr.io/<owner>/agentic-intel-demo/agent-stub:main by default.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "runtimes/agent-stub/**"
      - "demo-workspace/**"
      - "k8s/system-b/agent-stub.yaml"
      - ".github/workflows/publish-agent-stub.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/agent-stub
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: runtimes/agent-stub
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
