# Worked example — two-system architecture (shipped reference).
#
# Matches docs/architecture.md and docs/architecture-variants.md. System A
# owns orchestration, routing, and user-facing state. System B is an
# execution backend and model backend. Corresponds to what the repo's
# scripts/ and k8s/ directories currently deploy.

apiVersion: demo.architecture/v1
kind: Architecture

metadata:
  name: two-system

spec:

  topology:
    mode: two_system
    clusters:
      - name: system-a
        role: orchestration
        runtime: k3s
      - name: system-b
        role: execution
        runtime: k3s

  components:

    orchestrator:
      type: openclaw
      location: system-a

    model_router:
      type: litellm
      location: system-a

    inference_providers:
      - name: local_slm
        type: vllm
        location: system-b
        model: Qwen/Qwen3-4B-Instruct-2507
        context_length: 32768
      - name: cloud_reasoning
        type: bedrock
        model: us.anthropic.claude-sonnet-4-6
        auth: aws-sdk
        region: us-east-2

    execution_backends:
      - name: analytics
        location: system-b
        profile:
          cpu: 32
          memory: 64Gi

    artifact_store:
      type: minio
      location: system-b
      bucket: demo-artifacts

    chat_adapters:
      - telegram

  model_aliases:
    default: local_slm
    fast: local_slm
    reasoning: cloud_reasoning
    code: local_slm

  supported_execution_modes:
    - local_standard
    - local_large
    - offload_system_b
