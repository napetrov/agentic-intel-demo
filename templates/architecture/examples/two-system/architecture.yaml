# Worked example — two-system architecture (shipped reference).
#
# Spec-only file. The deploy artifacts under k8s/system-{a,b}/,
# examples/openclawinstance-intel-demo.yaml, and config/ are the actual
# source of truth for the two-system bring-up — this YAML documents the
# target shape but is not read at deploy time. See
# templates/architecture/README.md.
#
# Matches docs/architecture.md and docs/architecture-variants.md. System A
# owns orchestration, routing, and user-facing state. System B is an
# execution backend and model backend. Corresponds to what the repo's
# scripts/ and k8s/ directories currently deploy.

apiVersion: demo.architecture/v1
kind: Architecture

metadata:
  name: two-system

spec:

  topology:
    mode: two_system
    clusters:
      - name: system-a
        role: orchestration
        runtime: k3s
      - name: system-b
        role: execution
        runtime: k3s

  components:

    orchestrator:
      type: openclaw
      location: system-a

    model_router:
      type: litellm
      location: system-a

    inference_providers:
      - name: local_slm
        type: vllm
        location: system-b
        model: Qwen/Qwen3-4B-Instruct-2507
        context_length: 32768
      - name: cloud_reasoning
        type: bedrock
        model: us.anthropic.claude-sonnet-4-6
        auth: aws-sdk
        region: us-east-2

    execution_backends:
      - name: analytics
        location: system-b
        profile:
          cpu: 32
          memory: 64Gi

    artifact_store:
      type: minio
      location: system-b
      bucket: demo-artifacts

    chat_adapters:
      - telegram

  model_aliases:
    default: local_slm
    fast: local_slm
    reasoning: cloud_reasoning
    code: local_slm

  supported_execution_modes:
    - local_standard
    - local_large
    - offload_system_b

  # Optional: which confidential-computing runtimes the operator has
  # installed on this cluster. Today the demo wires one TDX runtime on
  # System A so a single agent (config/agents.yaml: openclaw-a-3) can be
  # scheduled into a TEE; agents without `confidential: ...` keep
  # running on regular nodes. Spec-only, like the rest of this file —
  # the actual RuntimeClass resource is installed by Kata-TDX or the
  # Confidential Containers operator out-of-band.
  confidential_runtimes:
    - name: tdx-kata
      kind: tdx
      location: system-a
      runtime_class: kata-qemu-tdx
      node_selector:
        intel.feature.node.kubernetes.io/tdx: "true"
