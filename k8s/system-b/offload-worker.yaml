apiVersion: apps/v1
kind: Deployment
metadata:
  name: offload-worker
  namespace: system-b
spec:
  replicas: 1
  # System B demo nodes are capacity constrained; do not require a second
  # offload-worker pod to fit during env/image rollouts.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: offload-worker
  template:
    metadata:
      labels:
        app: offload-worker
    spec:
      volumes:
        - name: offload-scenarios
          configMap:
            name: offload-scenarios
            defaultMode: 0555
            items:
              - key: _lib.sh
                path: _lib.sh
              - key: terminal-agent.run.sh
                path: terminal-agent/run.sh
              - key: terminal-agent.terminal-bench-reference.md
                path: terminal-agent/terminal-bench-reference.md
              - key: market-research.run.sh
                path: market-research/run.sh
              - key: market-research.report-task.md
                path: market-research/report-task.md
              - key: large-build-test.run.sh
                path: large-build-test/run.sh
              - key: large-build-test.build-task.md
                path: large-build-test/build-task.md
              - key: taskflow-pull.run.sh
                path: taskflow-pull/run.sh
              - key: taskflow-pull.task-brief.md
                path: taskflow-pull/task-brief.md
              - key: taskflow-pull.fixtures.tasks.json
                path: taskflow-pull/fixtures/tasks.json
      containers:
        - name: offload-worker
          # Default to the GHCR image published by
          # .github/workflows/publish-offload-worker.yml on every main-branch
          # push. `:main` is mutable, so combine with `imagePullPolicy:
          # Always` to actually refresh between deploys (otherwise an
          # IfNotPresent pull would silently keep an older cached :main
          # layer per node). To pin instead, replace :main with a digest
          # like @sha256:<digest> from the GHCR package and switch to
          # IfNotPresent.
          # For local k3s/k3d testing without GHCR access, build + load
          # the image with scripts/load-offload-worker-image.sh and then
          # sed this manifest to use the local tag, e.g.:
          #   sed -e 's|ghcr.io/napetrov/agentic-intel-demo/offload-worker:main|demo-offload-worker:latest|' \
          #       -e 's|imagePullPolicy: Always|imagePullPolicy: Never|' \
          #     k8s/system-b/offload-worker.yaml | kubectl apply -f -
          # The CI tier2-offload-smoke job in .github/workflows/test.yml
          # uses exactly that sed pattern.
          image: ghcr.io/napetrov/agentic-intel-demo/offload-worker:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MINIO_ENDPOINT
              value: "http://minio.system-b.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "demo-artifacts"
            - name: SCENARIO_SCRIPTS_DIR
              value: "/scenarios"
            # agent_invoke is not a Kubernetes Job. The worker forwards each
            # request to this persistent OpenClaw-compatible gateway service.
            - name: OPENCLAW_GATEWAY_URL
              value: "http://agent-stub.system-b.svc.cluster.local:8080"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: offload-scenarios
              mountPath: /scenarios
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: offload-worker
  namespace: system-b
spec:
  selector:
    app: offload-worker
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: offload-worker-nodeport
  namespace: system-b
spec:
  type: NodePort
  selector:
    app: offload-worker
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
