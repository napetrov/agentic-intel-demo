apiVersion: v1
kind: Namespace
metadata:
  name: system-b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: offload-worker
  namespace: system-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: offload-worker
  template:
    metadata:
      labels:
        app: offload-worker
    spec:
      containers:
        - name: offload-worker
          # Default to the GHCR image published by
          # .github/workflows/publish-offload-worker.yml on every main-branch
          # push. `:main` is mutable, so combine with `imagePullPolicy:
          # Always` to actually refresh between deploys (otherwise an
          # IfNotPresent pull would silently keep an older cached :main
          # layer per node). To pin instead, replace :main with a digest
          # like @sha256:<digest> from the GHCR package and switch to
          # IfNotPresent.
          # For local k3s/k3d testing without GHCR access, build + load
          # the image with scripts/load-offload-worker-image.sh and then
          # sed this manifest to use the local tag, e.g.:
          #   sed -e 's|ghcr.io/napetrov/agentic-intel-demo/offload-worker:main|demo-offload-worker:latest|' \
          #       -e 's|imagePullPolicy: Always|imagePullPolicy: Never|' \
          #     k8s/system-b/offload-worker.yaml | kubectl apply -f -
          # The CI tier2-offload-smoke job in .github/workflows/test.yml
          # uses exactly that sed pattern.
          image: ghcr.io/napetrov/agentic-intel-demo/offload-worker:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MINIO_ENDPOINT
              value: "http://minio.system-b.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "demo-artifacts"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: offload-worker
  namespace: system-b
spec:
  selector:
    app: offload-worker
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: offload-worker-nodeport
  namespace: system-b
spec:
  type: NodePort
  selector:
    app: offload-worker
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
