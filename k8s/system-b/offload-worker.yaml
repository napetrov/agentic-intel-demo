apiVersion: v1
kind: Namespace
metadata:
  name: system-b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: offload-worker
  namespace: system-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: offload-worker
  template:
    metadata:
      labels:
        app: offload-worker
    spec:
      containers:
        - name: offload-worker
          image: docker.io/library/demo-offload-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MINIO_ENDPOINT
              value: "http://minio.system-b.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "demo-artifacts"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: offload-worker
  namespace: system-b
spec:
  selector:
    app: offload-worker
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: offload-worker-nodeport
  namespace: system-b
spec:
  type: NodePort
  selector:
    app: offload-worker
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
