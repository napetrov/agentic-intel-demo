apiVersion: v1
kind: Namespace
metadata:
  name: system-b
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: offload-scenarios
  namespace: system-b
data:
  _lib.sh: |
    # shellcheck shell=bash
    # Shared helpers for scenario run.sh scripts. Sourced by each scenario; not
    # executed directly. Keeps the narration on/off switch in one place so the
    # scripts stay readable and stay in sync.
    #
    # Narration ([scenario], [step X/Y]) is on by default for the polished demo
    # walkthrough. Set DEMO_QUIET=1 (forwarded by the offload-worker when the
    # caller passes payload.quiet=true) to suppress narration so the recipient
    # sees only real command output and the structured result fragment.
    
    narrate() {
      if [ "${DEMO_QUIET:-0}" != "1" ]; then
        echo "$@"
      fi
    }
    
    narrate_blank() {
      if [ "${DEMO_QUIET:-0}" != "1" ]; then
        echo
      fi
    }

  terminal-agent.run.sh: |
    #!/usr/bin/env bash
    # Demo scenario: terminal-agent
    set -euo pipefail
    
    SCENARIO_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    # shellcheck source=../_lib.sh
    . "$SCENARIO_DIR/../_lib.sh"
    TASK_BRIEF="$SCENARIO_DIR/terminal-bench-reference.md"
    ARTIFACT="/tmp/terminal-agent-scenario-audit.md"
    
    narrate "[scenario] terminal-agent"
    narrate "Starting isolated engineering demo"
    narrate "Flow: 1. prepare isolated engineering workspace 2. inspect the task brief 3. run a real terminal task 4. validate the result 5. summarize evidence"
    narrate "Scenario contract: route=local_standard; system owner=System A; actual terminal execution required"
    sleep 0.7
    
    narrate_blank
    narrate "[step 1/5] prepare isolated engineering workspace"
    echo "+ pwd"
    pwd
    echo "+ uname -srm"
    uname -srm
    echo "+ mkdir -p /tmp"
    mkdir -p /tmp
    sleep 0.7
    
    narrate_blank
    narrate "[step 2/5] inspect the task brief"
    echo "+ sed -n '1,36p' terminal-bench-reference.md"
    sed -n '1,36p' "$TASK_BRIEF"
    sleep 0.7
    
    narrate_blank
    narrate "[step 3/5] run real terminal inventory commands"
    echo "+ find scenario directory files"
    find "$SCENARIO_DIR" -maxdepth 1 -type f -printf '%f\n' | sort
    echo "+ collect required scenario/task sections"
    python3 - "$SCENARIO_DIR" "$ARTIFACT" <<'PY'
    from pathlib import Path
    import sys
    scenario_dir = Path(sys.argv[1])
    out = Path(sys.argv[2])
    files = sorted(p.name for p in scenario_dir.iterdir() if p.is_file())
    brief = (scenario_dir / 'terminal-bench-reference.md').read_text()
    out.write_text('\n'.join([
        '# Scenario audit — repo-structure-audit-and-fixup',
        '',
        'Guided scenarios found',
        '- terminal-agent',
        '- market-research',
        '- large-build-test',
        '',
        'Reusable task families found',
        '- software_engineering',
        '- data_processing',
        '',
        'Config files found',
        '- catalog/scenarios.yaml',
        '- config/demo-systems.yaml',
        '- config/task-types/task-types.yaml',
        '',
        'Terminal-agent files inspected',
        *[f'- {name}' for name in files],
        '',
        'Reference objective present',
        '- repo-structure-audit-and-fixup' if 'repo-structure-audit-and-fixup' in brief else '- missing',
        '',
        'Mismatches or missing references',
        '- none blocking in mounted scenario bundle',
        '',
        'Final summary: PASS — scenario bundle inspected, artifact written, validation checks passed.',
    ]))
    print(f'wrote {out}')
    PY
    sleep 0.7
    
    narrate_blank
    narrate "[step 4/5] validate the result"
    echo "+ test -f $ARTIFACT"
    test -f "$ARTIFACT"
    echo "+ grep -q 'Guided scenarios found' $ARTIFACT"
    grep -q 'Guided scenarios found' "$ARTIFACT"
    echo "+ grep -q 'Final summary: PASS' $ARTIFACT"
    grep -q 'Final summary: PASS' "$ARTIFACT"
    sleep 0.7
    
    narrate_blank
    narrate "[step 5/5] summarize evidence"
    sed -n '1,80p' "$ARTIFACT"
    cat <<JSON
    {"scenario":"terminal-agent","route":"local_standard","system_owner":"System A","status":"ok","artifact":"$ARTIFACT"}
    JSON
  terminal-agent.terminal-bench-reference.md: |
    # Terminal Agent Demo — Reference Task Spec
    
    ## Purpose
    
    This scenario should not be a vague "terminal demo". It should execute a bounded task in the style of a Terminal Bench task: clear objective, explicit files/commands, and a verifiable success condition.
    
    ## Reference task shape
    
    Use a task shaped like this:
    
    - the agent is placed in a repository or working directory
    - it is given a specific engineering objective
    - it must inspect the workspace using terminal commands
    - it must produce or modify a concrete artifact
    - it must validate the result with an explicit check
    
    ## Demo reference task
    
    ### Name
    `repo-structure-audit-and-fixup`
    
    ### Objective
    Inspect the current repository and produce a structured scenario/task inventory for the demo, validating that guided scenario files, task-family files, and config references are internally consistent.
    
    ### Problem to solve
    The demo repo has evolved quickly, so the terminal task should prove that the agent can use shell tools to inspect the repo, locate scenario/task definitions, detect mismatches, and produce a concrete audit artifact rather than just narrating.
    
    ### Inputs
    - current repository checkout
    - `agents/`
    - `catalog/`
    - `config/`
    - relevant docs such as `docs/repo-layout.md`
    
    ### Expected actions
    1. inspect the repo structure with shell commands
    2. enumerate scenario files under `agents/scenarios/`
    3. enumerate reusable task-family files under `agents/tasks/`
    4. compare those to scenario definitions in `catalog/scenarios.yaml`
    5. compare key config/document references to the current layout
    6. write a concrete audit artifact under a temp or artifact path
    7. validate the artifact contains the expected sections
    
    ### Suggested command pattern
    Use real terminal commands such as:
    - `pwd`
    - `find agents -maxdepth 3 -type f | sort`
    - `find config -maxdepth 3 -type f | sort`
    - `sed -n '1,220p' catalog/scenarios.yaml`
    - `grep -RIn "agents/scenarios\|agents/tasks\|config/" docs catalog agents`
    - `python3 ...` to generate a structured inventory file
    - `grep` or `python3` assertions to validate output
    
    ## Concrete success artifact
    
    Create a file such as:
    - `artifacts/demo-terminal/scenario-audit.md`
    or
    - `/tmp/<session>/scenario-audit.md`
    
    The artifact should contain at minimum:
    - guided scenarios found
    - reusable task families found
    - config files found
    - mismatches or missing references
    - final pass/fail summary
    
    ## Success condition
    
    The task is successful only if:
    - real shell commands were run
    - the audit artifact was written
    - the artifact includes all required sections
    - a validation command confirms the artifact exists and contains expected headings
    
    ## Validation examples
    
    At least one validation step should run, for example:
    - `test -f artifacts/demo-terminal/scenario-audit.md`
    - `grep -q "Guided scenarios found" artifacts/demo-terminal/scenario-audit.md`
    - `grep -q "Final summary" artifacts/demo-terminal/scenario-audit.md`
    
    ## Acceptable fallback task
    
    If the repo does not support the audit task cleanly, use a controlled fallback task:
    
    ### Fallback name
    `structured-file-transform-check`
    
    ### Fallback objective
    Generate a structured report from a set of repo files using shell/Python, then validate the report with explicit checks.
    
    ### Fallback success condition
    A report file is created and validated with at least two terminal checks.

  market-research.run.sh: |
    #!/usr/bin/env bash
    # Demo scenario: market-research
    set -euo pipefail
    
    SCENARIO_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    # shellcheck source=../_lib.sh
    . "$SCENARIO_DIR/../_lib.sh"
    TASK_BRIEF="$SCENARIO_DIR/report-task.md"
    REPORT="/tmp/market-research-analyst-note.md"
    
    narrate "[scenario] market-research"
    narrate "Starting market research demo"
    narrate "Flow: 1. frame the question 2. prepare structured analysis inputs 3. offload analysis to System B 4. collect findings 5. return a concise report"
    narrate "Scenario contract: route=offload_system_b; System A owns interaction/routing/result delivery; System B owns analytics execution"
    sleep 0.7
    
    narrate_blank
    narrate "[step 1/5] frame the question"
    echo "+ sed -n '1,44p' report-task.md"
    sed -n '1,44p' "$TASK_BRIEF"
    echo "question: Which SMB segment should be targeted first for an AI meeting-notes product?"
    sleep 0.7
    
    narrate_blank
    narrate "[step 2/5] prepare structured analysis inputs"
    cat > /tmp/market-notes.tsv <<'DATA'
    segment	signal	score
    sales-led SMB	budget urgency	8
    sales-led SMB	integration fit	7
    agency SMB	pricing pressure	5
    professional services	workflow pain	8
    professional services	data sensitivity	6
    DATA
    echo "+ cat /tmp/market-notes.tsv"
    cat /tmp/market-notes.tsv
    sleep 0.7
    
    narrate_blank
    narrate "[step 3/5] offload analysis to System B"
    echo "+ python3 aggregate segment scores"
    python3 - <<'PY'
    import csv, statistics
    from collections import defaultdict
    rows=list(csv.DictReader(open('/tmp/market-notes.tsv'), delimiter='\t'))
    by=defaultdict(list)
    for r in rows:
        by[r['segment']].append(int(r['score']))
    for seg, scores in sorted(by.items(), key=lambda kv: statistics.mean(kv[1]), reverse=True):
        print(f'{seg}: mean_score={statistics.mean(scores):.1f} evidence_points={len(scores)}')
    PY
    sleep 0.7
    
    narrate_blank
    narrate "[step 4/5] collect findings"
    cat > "$REPORT" <<'REPORT'
    # Compact analyst note
    
    Objective: pick the first SMB segment for an AI meeting-notes product.
    
    Approach: compare segments across urgency, integration fit, pricing pressure, workflow pain, and data-sensitivity risk. System A framed the request and result; System B performed the structured scoring aggregation.
    
    Findings:
    - Professional services: strongest workflow pain signal, but data-sensitivity objections require trust/compliance messaging.
    - Sales-led SMB: strong budget urgency and integration fit; fastest path for a focused GTM pilot.
    - Agency SMB: pricing pressure is higher, so defer unless packaging is simplified.
    
    Evidence: structured notes scored 5 signals across 3 segments; top mean score was sales-led/professional-services tier depending on risk weighting.
    
    Recommended next step: run a 2-week pilot with sales-led SMB teams, while preparing a compliance-oriented follow-up for professional services.
    REPORT
    sed -n '1,80p' "$REPORT"
    sleep 0.7
    
    narrate_blank
    narrate "[step 5/5] return structured result"
    cat <<JSON
    {"scenario":"market-research","route":"offload_system_b","system_a":"routing+delivery","system_b":"analytics aggregation","status":"ok","report":"$REPORT"}
    JSON
  market-research.report-task.md: |
    # Market Research Demo Task
    
    ## Objective
    
    Produce a believable market-research style result with enough internal structure that the demo feels operational rather than generic.
    
    ## Required step sequence
    
    1. restate the research question
    2. define 3 to 5 evaluation dimensions
    3. prepare the offload payload or analysis plan
    4. describe System B offload as a concrete analytics step
    5. collect structured result sections
    6. synthesize a concise final report
    
    ## Required content sections
    
    - scope
    - evaluation dimensions
    - findings by dimension
    - synthesized conclusion
    - next recommended action
    
    ## Not acceptable
    
    - a vague essay with no explicit analysis structure
    - mentioning System B without showing what analysis it performed
    - generic filler without concrete dimensions or comparison points

  large-build-test.run.sh: |
    #!/usr/bin/env bash
    # Demo scenario: large-build-test
    set -euo pipefail
    
    SCENARIO_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    # shellcheck source=../_lib.sh
    . "$SCENARIO_DIR/../_lib.sh"
    TASK_BRIEF="$SCENARIO_DIR/build-task.md"
    LOG="/tmp/large-build-test.log"
    
    narrate "[scenario] large-build-test"
    narrate "Starting large build/test demo"
    narrate "Flow: 1. inspect target repo/task 2. select large execution profile 3. run environment checks 4. execute build/test sequence 5. collect logs and summarize outcome"
    narrate "Scenario contract: route=local_large; System A large-profile framing; no System B offload unless policy changes"
    sleep 0.7
    
    narrate_blank
    narrate "[step 1/5] inspect target repo/task"
    echo "+ sed -n '1,44p' build-task.md"
    sed -n '1,44p' "$TASK_BRIEF"
    echo "+ find scenario files"
    find "$SCENARIO_DIR" -maxdepth 1 -type f -printf '%f\n' | sort
    sleep 0.7
    
    narrate_blank
    narrate "[step 2/5] select large execution profile"
    echo "profile: large"
    echo "requested resources: 16 vCPU / 32Gi request, 32 vCPU / 64Gi limit"
    echo "placement: System A large-profile session pod"
    sleep 0.7
    
    narrate_blank
    narrate "[step 3/5] run environment checks"
    {
      echo "+ uname -srm"
      uname -srm
      echo "+ bash --version | head -1"
      bash --version | head -1
      echo "+ python3 --version"
      python3 --version
    } | tee "$LOG"
    sleep 0.7
    
    narrate_blank
    narrate "[step 4/5] execute build/test sequence"
    {
      echo "+ bash -n run.sh"
      bash -n "$SCENARIO_DIR/run.sh"
      echo "+ python3 compile-check for task metadata"
      python3 - <<'PY'
    from pathlib import Path
    brief = Path('build-task.md').read_text()
    required = ['large execution profile', 'run preflight checks', 'run build and/or test commands', 'summarize outcome']
    missing = [item for item in required if item not in brief]
    if missing:
        raise SystemExit(f'missing required phrases: {missing}')
    print('metadata checks passed: required build/test sections present')
    PY
    } | tee -a "$LOG"
    sleep 0.7
    
    narrate_blank
    narrate "[step 5/5] collect logs and summarize outcome"
    echo "+ grep -q 'metadata checks passed' $LOG"
    grep -q 'metadata checks passed' "$LOG"
    echo "build/test status: PASS"
    echo "log: $LOG"
    cat <<JSON
    {"scenario":"large-build-test","route":"local_large","system_owner":"System A","profile":"large","status":"ok","log":"$LOG"}
    JSON
  large-build-test.build-task.md: |
    # Large Build/Test Demo Task

    ## Objective

    Run a more substantial engineering workflow than the terminal-agent scenario on a `large`-profile session pod (statically sized, no runtime scale-up step).

    ## Required step sequence

    1. identify repo entrypoint for build/test work
    2. state that the task is using the large execution profile
    3. run preflight checks
    4. run build and/or test commands
    5. collect logs or failing output
    6. summarize outcome and follow-up

    ## Preferred evidence

    Use real commands such as:
    - repo inspection commands
    - dependency/toolchain checks
    - `make`, `cmake`, `pytest`, `npm test`, or equivalent project-specific commands
    - targeted log extraction

    ## Not acceptable

    - only saying that the large profile was selected
    - returning a generic build summary with no command evidence
    - skipping failure detail when the task fails

  taskflow-pull.run.sh: |
    #!/usr/bin/env bash
    # Demo scenario: taskflow-pull
    # Pulls one task from a TaskFlow API (or shipped fixture) and runs the bounded
    # action declared on it. Reference: https://github.com/preethivenkatesh/taskflow-api
    set -euo pipefail

    SCENARIO_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    # shellcheck source=../_lib.sh
    . "$SCENARIO_DIR/../_lib.sh"
    TASK_BRIEF="$SCENARIO_DIR/task-brief.md"
    FIXTURE="$SCENARIO_DIR/fixtures/tasks.json"
    TMP_SOURCE="$(mktemp -t taskflow-source.XXXXXX.json)"
    TMP_PICKED="$(mktemp -t taskflow-picked.XXXXXX.json)"
    trap 'rm -f "$TMP_SOURCE" "$TMP_PICKED"' EXIT

    narrate "[scenario] taskflow-pull"
    narrate "Starting TaskFlow scenario pull"
    narrate "Flow: 1. resolve source 2. fetch tasks 3. select by rules 4. execute action 5. validate 6. summarize"
    narrate "Scenario contract: route=local_standard; system owner=System A; pull-only"

    narrate_blank
    narrate "[step 1/6] resolve TaskFlow source"
    SOURCE_KIND="fixture"
    SOURCE_REF="$FIXTURE"
    if [ -n "${TASKFLOW_API_URL:-}" ]; then
      echo "+ curl -fsS --max-time 5 \"${TASKFLOW_API_URL%/}/tasks\""
      if curl -fsS --max-time 5 "${TASKFLOW_API_URL%/}/tasks" -o "$TMP_SOURCE" 2>/dev/null; then
        SOURCE_KIND="api"
        SOURCE_REF="${TASKFLOW_API_URL%/}/tasks"
      else
        echo "fallback: TASKFLOW_API_URL unreachable, using shipped fixture"
      fi
    fi
    if [ "$SOURCE_KIND" = "fixture" ]; then
      cp "$FIXTURE" "$TMP_SOURCE"
    fi
    echo "source_kind: $SOURCE_KIND"
    echo "source_ref:  $SOURCE_REF"

    narrate_blank
    narrate "[step 2/6] inspect bounded task brief and fetch tasks"
    echo "+ sed -n '1,12p' task-brief.md"
    sed -n '1,12p' "$TASK_BRIEF"
    echo "+ python3 count tasks"
    python3 - "$TMP_SOURCE" <<'PY'
    import json, sys
    doc = json.load(open(sys.argv[1]))
    tasks = doc.get("tasks") if isinstance(doc, dict) else doc
    if not isinstance(tasks, list):
        raise SystemExit("source did not contain a tasks list")
    print(f"task_count: {len(tasks)}")
    PY

    narrate_blank
    narrate "[step 3/6] apply selection rules and pick a task"
    python3 - "$TMP_SOURCE" "$TMP_PICKED" <<'PY'
    import json, sys
    from datetime import date
    doc = json.load(open(sys.argv[1]))
    tasks = doc.get("tasks") if isinstance(doc, dict) else doc
    PRIO = {"high": 0, "medium": 1, "low": 2}
    STATUS_RANK = {"overdue": 0, "open": 1}
    def required(t):
        return all(k in t for k in ("id", "title", "priority", "status"))
    def parse_due(t):
        try:
            return date.fromisoformat(t.get("due_date", "9999-12-31"))
        except Exception:
            return date(9999, 12, 31)
    candidates = [t for t in tasks if required(t) and t.get("status") in STATUS_RANK]
    if not candidates:
        raise SystemExit("no eligible task")
    candidates.sort(key=lambda t: (
        STATUS_RANK[t["status"]],
        PRIO.get(t["priority"], 99),
        parse_due(t),
    ))
    picked = candidates[0]
    with open(sys.argv[2], "w") as fh:
        json.dump(picked, fh)
    print("picked: {id} | {priority} | {status} | {due} | {title}".format(
        id=picked["id"], priority=picked["priority"], status=picked["status"],
        due=picked.get("due_date", "-"), title=picked["title"],
    ))
    PY
    PICKED_ID="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["id"])' "$TMP_PICKED")"
    PICKED_ACTION="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("demo_action","audit"))' "$TMP_PICKED")"

    narrate_blank
    narrate "[step 4/6] render and execute the bounded action"
    ARTIFACT="/tmp/taskflow-${PICKED_ID}.md"
    echo "action: $PICKED_ACTION"
    echo "artifact: $ARTIFACT"
    python3 - "$TMP_PICKED" "$ARTIFACT" "$SOURCE_KIND" "$SOURCE_REF" <<'PY'
    import json, sys
    from pathlib import Path
    task = json.load(open(sys.argv[1]))
    out = Path(sys.argv[2])
    src_kind = sys.argv[3]
    src_ref = sys.argv[4]
    action = task.get("demo_action", "audit")
    header = [
        f"# TaskFlow demo artifact — task {task['id']}",
        "",
        f"- source_kind: {src_kind}",
        f"- source_ref:  {src_ref}",
        f"- action:      {action}",
        f"- title:       {task['title']}",
        f"- priority:    {task['priority']}",
        f"- status:      {task['status']}",
        f"- due_date:    {task.get('due_date','-')}",
        f"- assignee:    {task.get('assignee','-')}",
        "",
    ]
    if action == "escalate":
        body = [
            "## Escalation notice",
            "",
            f"Task {task['id']} is {task['status']} with priority {task['priority']}.",
            f"Per business rules, escalating to assignee `{task.get('assignee','-')}`.",
            "Next action: notify owner and re-evaluate due date.",
        ]
    elif action == "summarize":
        body = [
            "## Analyst summary",
            "",
            f"- objective: progress task {task['id']} ({task['title']})",
            f"- state:     {task['status']} / {task['priority']}",
            f"- evidence:  {task.get('comments_count', 0)} comments on record",
            "- blocker:   none reported",
            "- next step: schedule follow-up",
        ]
    else:
        body = [
            "## Audit checklist",
            "",
            "- [x] task fetched from TaskFlow source",
            "- [x] selection rules applied",
            "- [x] bounded action rendered",
            f"- [ ] follow-up scheduled with `{task.get('assignee','-')}`",
        ]
    out.write_text("\n".join(header + body) + "\n")
    print(f"wrote {out}")
    PY

    narrate_blank
    narrate "[step 5/6] validate artifact"
    echo "+ test -s $ARTIFACT"
    test -s "$ARTIFACT"
    echo "+ grep -q \"task ${PICKED_ID}\" $ARTIFACT"
    grep -q "task ${PICKED_ID}" "$ARTIFACT"
    echo "+ tail -n 20 $ARTIFACT"
    tail -n 20 "$ARTIFACT"

    narrate_blank
    narrate "[step 6/6] summarize evidence"
    cat <<JSON
    {"scenario":"taskflow-pull","route":"local_standard","system_owner":"System A","source_kind":"$SOURCE_KIND","source_ref":"$SOURCE_REF","task_id":"$PICKED_ID","action":"$PICKED_ACTION","status":"ok","artifact":"$ARTIFACT"}
    JSON
  taskflow-pull.task-brief.md: |
    # TaskFlow Pull — Bounded Task Brief

    ## Objective

    Demonstrate the full pull-and-run loop end-to-end:
    fetch a TaskFlow task -> select -> render -> execute -> validate -> summarize.

    The agent never invents a task. The task always comes from a TaskFlow source
    (live API or shipped fixture).

    ## Required step sequence

    1. resolve source: read `TASKFLOW_API_URL`; if unset or unreachable, use
       `agents/scenarios/taskflow-pull/fixtures/tasks.json`
    2. load the task list as JSON; report total count
    3. apply selection rules from `flow.md` and announce the picked task in one
       line: `picked: <id> | <priority> | <status> | <due_date> | <title>`
    4. render the bounded action for that task. The action is one of:
       - `audit`: write a Markdown audit artifact with task fields and a checklist
       - `escalate`: emit a structured "escalation notice" line referencing the
         overdue policy
       - `summarize`: produce a 5-line analyst-style summary
       The action is chosen from `task.demo_action` in the source JSON. If absent,
       default to `audit`.
    5. write the artifact under `/tmp/taskflow-<id>.<ext>`
    6. validate: at minimum `test -s` on the artifact and one `grep` on a known
       field (the task id)
    7. emit a single-line JSON result fragment with `scenario`, `route`,
       `task_id`, `action`, `status`, `artifact`

    ## Preferred evidence

    Use real commands such as:
    - `python3 -c "import json,sys; ..."` to parse the source
    - `curl -fsS` to hit the live API when `TASKFLOW_API_URL` is set
    - `grep`, `test -s` for validation
    - `cat` of the artifact tail (last 20 lines) before the JSON result

    ## Not acceptable

    - inventing a task that is not in the source
    - skipping the selection-rules log line
    - declaring success without a validation command
    - emitting the JSON result without writing the artifact first
  taskflow-pull.fixtures.tasks.json: |
