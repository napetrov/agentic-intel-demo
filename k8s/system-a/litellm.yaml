apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: inference
data:
  config.yaml: |
    model_list:
      - model_name: system-b-vllm-qwen3-4b-fast
        litellm_params:
          model: openai/Qwen/Qwen3-4B-Instruct-2507
          api_base: "${SYSTEM_B_VLLM_ENDPOINT}"
          api_key: none

      - model_name: system-b-vllm-qwen3-4b-default
        litellm_params:
          model: openai/Qwen/Qwen3-4B-Instruct-2507
          api_base: "${SYSTEM_B_VLLM_ENDPOINT}"
          api_key: none
          timeout: 30

      - model_name: aws-bedrock-claude-sonnet
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
          aws_region_name: os.environ/AWS_REGION
          timeout: 60

      - model_name: sambanova-deepseek-v3-1
        litellm_params:
          model: sambanova/DeepSeek-V3.1
          api_key: os.environ/SAMBANOVA_API_KEY
          timeout: 60

    litellm_settings:
      drop_params: true
      set_verbose: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.63.11-stable
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: AWS_REGION
              value: "${AWS_REGION}"
            - name: AWS_BEARER_TOKEN_BEDROCK
              value: "${AWS_BEARER_TOKEN_BEDROCK}"
            - name: SAMBANOVA_API_KEY
              value: "${SAMBANOVA_API_KEY}"
            - name: CLAUDE_CODE_USE_BEDROCK
              value: "1"
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: inference
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-nodeport
  namespace: inference
spec:
  selector:
    app: litellm
  type: NodePort
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 31400
