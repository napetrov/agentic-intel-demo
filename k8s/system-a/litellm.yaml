apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: inference
data:
  config.yaml: |
    # Canonical aliases used by the rest of the stack:
    #   litellm/fast       — System B vLLM (Qwen3-4B), low-latency
    #   litellm/default    — same backend, longer timeout
    #   litellm/reasoning  — Bedrock Claude Sonnet
    #   litellm/sambanova  — SambaNova DeepSeek
    # operator-chat-config.template.json, examples/openclawinstance-intel-demo.yaml,
    # and session-pod-template.yaml all reference these names.
    model_list:
      - model_name: fast
        litellm_params:
          model: openai/Qwen/Qwen3-4B-Instruct-2507
          api_base: "${SYSTEM_B_VLLM_ENDPOINT}"
          api_key: none

      - model_name: default
        litellm_params:
          model: openai/Qwen/Qwen3-4B-Instruct-2507
          api_base: "${SYSTEM_B_VLLM_ENDPOINT}"
          api_key: none
          timeout: 30

      - model_name: reasoning
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
          aws_region_name: os.environ/AWS_REGION
          timeout: 60

      - model_name: sambanova
        litellm_params:
          model: sambanova/DeepSeek-V3.1
          api_key: os.environ/SAMBANOVA_API_KEY
          timeout: 60

    litellm_settings:
      drop_params: true
      set_verbose: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.63.11-stable
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          env:
            # AWS_REGION is non-sensitive — keep as plain env from envsubst
            # so it can be overridden per environment without touching the
            # Secret. Defaults to us-east-2 when unset.
            - name: AWS_REGION
              value: "${AWS_REGION}"
            - name: CLAUDE_CODE_USE_BEDROCK
              value: "1"
            # Sensitive values come from the litellm-secrets Secret in the
            # `inference` namespace. Materialize it via:
            #   AWS_BEARER_TOKEN_BEDROCK=... SAMBANOVA_API_KEY=... \
            #     APPLY=1 ./scripts/create-operator-secrets.sh
            # which creates litellm-secrets in `inference` alongside the
            # main intel-demo-operator-secrets in `default`.
            - name: AWS_BEARER_TOKEN_BEDROCK
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: AWS_BEARER_TOKEN_BEDROCK
            - name: SAMBANOVA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: SAMBANOVA_API_KEY
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: inference
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-nodeport
  namespace: inference
spec:
  selector:
    app: litellm
  type: NodePort
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 31400
