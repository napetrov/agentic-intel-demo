apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
apiVersion: v1
kind: Secret
metadata:
  name: session-pod-artifact-creds
  namespace: agents
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-bot
  namespace: agents
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-pod-template
  namespace: agents
data:
  pod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      labels:
        app: session-pod
    spec:
      restartPolicy: OnFailure
      containers:
        - name: agent
          image: ${SESSION_IMAGE}
          imagePullPolicy: Never
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /config/openclaw.json
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: CLAUDE_CODE_USE_BEDROCK
              value: "1"
            - name: AWS_BEARER_TOKEN_BEDROCK
              value: ${AWS_BEARER_TOKEN_BEDROCK}
            - name: ANTHROPIC_DEFAULT_SONNET_MODEL
              value: ${ANTHROPIC_DEFAULT_SONNET_MODEL}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: session-pod-artifact-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: session-pod-artifact-creds
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: session-pod-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-pod-config
  namespace: agents
data:
  openclaw.json: |-
    {
      "gateway": {
        "mode": "local",
        "port": 18789,
        "bind": "loopback",
        "auth": { "mode": "none" }
      },
      "models": {
        "providers": {
          "litellm": {
            "baseUrl": "http://litellm.inference.svc.cluster.local:4000/v1",
            "apiKey": "none",
            "auth": "api-key",
            "api": "openai-completions",
            "models": [
              { "id": "system-b-vllm-qwen3-4b-fast", "name": "System B vLLM Qwen3-4B Fast", "api": "openai-completions", "contextWindow": 32768, "maxTokens": 4096 },
              { "id": "system-b-vllm-qwen3-4b-default", "name": "System B vLLM Qwen3-4B Default", "api": "openai-completions", "contextWindow": 32768, "maxTokens": 4096 }
            ]
          },
          "amazon-bedrock": {
            "baseUrl": "https://bedrock-runtime.${AWS_REGION}.amazonaws.com",
            "auth": "aws-sdk",
            "api": "bedrock-converse-stream",
            "models": [
              { "id": "${BEDROCK_MODEL_ID}", "name": "Claude Sonnet", "contextWindow": 200000, "maxTokens": 8192 }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": { "primary": "amazon-bedrock/${BEDROCK_MODEL_ID}", "fallbacks": ["litellm/system-b-vllm-qwen3-4b-fast"] },
          "workspace": "/workspace"
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "accounts": {
            "session-agent": {
              "enabled": true,
              "botToken": "${TELEGRAM_BOT_TOKEN}",
              "dmPolicy": "open",
              "groupPolicy": "open",
              "allowFrom": ["${TELEGRAM_ALLOWED_FROM}"],
              "groupAllowFrom": ["${TELEGRAM_ALLOWED_FROM}"]
            }
          }
        }
      },
      "plugins": {
        "allow": ["telegram", "amazon-bedrock", "memory-core", "acpx"],
        "entries": {
          "telegram": { "enabled": true },
          "amazon-bedrock": { "enabled": true }
        }
      },
      "tools": {
        "exec": { "security": "full", "ask": "off" }
      }
    }
