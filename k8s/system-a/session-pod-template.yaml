apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
# The Secrets `session-pod-artifact-creds` and `telegram-bot` (both in
# namespace `agents`) used to live here as inline `stringData: ${VAR}`
# placeholders that required an undocumented `envsubst` pre-step. They
# are now created by `scripts/create-operator-secrets.sh`, which uses
# `kubectl create secret --dry-run=client -o yaml | kubectl apply -f -`
# so values never land on disk. Run that script before applying this
# manifest.
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-pod-template
  namespace: agents
data:
  pod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      labels:
        app: session-pod
    spec:
      restartPolicy: OnFailure
      containers:
        - name: agent
          image: ${SESSION_IMAGE}
          imagePullPolicy: Never
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /config/openclaw.json
            # AWS_REGION + ANTHROPIC_DEFAULT_SONNET_MODEL are non-sensitive
            # routing values — keep envsubst-style so they can be tuned per
            # environment without modifying the Secret.
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: ANTHROPIC_DEFAULT_SONNET_MODEL
              value: ${ANTHROPIC_DEFAULT_SONNET_MODEL}
            - name: BEDROCK_MODEL_ID
              value: ${BEDROCK_MODEL_ID}
            - name: TELEGRAM_ALLOWED_FROM
              value: "${TELEGRAM_ALLOWED_FROM}"
            - name: CLAUDE_CODE_USE_BEDROCK
              value: "1"
            # Sensitive values are read from Secrets in the agents
            # namespace, all created by scripts/create-operator-secrets.sh.
            # secretKeyRef can't cross namespaces, so AWS_BEARER_TOKEN_BEDROCK
            # lives in `bedrock-creds` here, not in the
            # `intel-demo-operator-secrets` copy in the operator's namespace.
            - name: AWS_BEARER_TOKEN_BEDROCK
              valueFrom:
                secretKeyRef:
                  name: bedrock-creds
                  key: AWS_BEARER_TOKEN_BEDROCK
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: session-pod-artifact-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: session-pod-artifact-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot
                  key: TELEGRAM_BOT_TOKEN
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: session-pod-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-pod-config
  namespace: agents
data:
  openclaw.json: |-
    {
      "gateway": {
        "mode": "local",
        "port": 18789,
        "bind": "loopback",
        "auth": { "mode": "none" }
      },
      "models": {
        "providers": {
          "litellm": {
            "baseUrl": "http://litellm.inference.svc.cluster.local:4000/v1",
            "apiKey": "none",
            "auth": "api-key",
            "api": "openai-completions",
            "models": [
              { "id": "fast", "name": "Fast (Qwen3-4B)", "api": "openai-completions", "contextWindow": 32768, "maxTokens": 4096 },
              { "id": "default", "name": "Default (Qwen3-4B)", "api": "openai-completions", "contextWindow": 32768, "maxTokens": 4096 },
              { "id": "reasoning", "name": "Reasoning (Claude Sonnet via Bedrock)", "api": "openai-completions", "contextWindow": 200000, "maxTokens": 8192 },
              { "id": "sambanova", "name": "SambaNova (DeepSeek V3.1)", "api": "openai-completions", "contextWindow": 32768, "maxTokens": 4096 }
            ]
          },
          "amazon-bedrock": {
            "baseUrl": "https://bedrock-runtime.${AWS_REGION}.amazonaws.com",
            "auth": "aws-sdk",
            "api": "bedrock-converse-stream",
            "models": [
              { "id": "${BEDROCK_MODEL_ID}", "name": "Claude Sonnet", "contextWindow": 200000, "maxTokens": 8192 }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": { "primary": "amazon-bedrock/${BEDROCK_MODEL_ID}", "fallbacks": ["litellm/fast", "litellm/default"] },
          "workspace": "/workspace"
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "accounts": {
            "session-agent": {
              "enabled": true,
              "botToken": "${TELEGRAM_BOT_TOKEN}",
              "dmPolicy": "open",
              "groupPolicy": "open",
              "allowFrom": ["${TELEGRAM_ALLOWED_FROM}"],
              "groupAllowFrom": ["${TELEGRAM_ALLOWED_FROM}"]
            }
          }
        }
      },
      "plugins": {
        "allow": ["telegram", "amazon-bedrock", "memory-core", "acpx"],
        "entries": {
          "telegram": { "enabled": true },
          "amazon-bedrock": { "enabled": true }
        }
      },
      "tools": {
        "exec": { "security": "full", "ask": "off" }
      }
    }
