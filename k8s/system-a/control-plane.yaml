apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-auth
  namespace: platform
type: Opaque
stringData:
  CONTROL_PLANE_TOKEN: ${CONTROL_PLANE_TOKEN}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ${CONTROL_IMAGE}
          imagePullPolicy: Never
          env:
            - name: AGENTS_NAMESPACE
              value: agents
            - name: SESSION_TEMPLATE_CONFIGMAP
              value: session-pod-template
            - name: SYSTEM_B_KUBECONFIG
              value: /etc/system-b/kubeconfig
            - name: MINIO_ENDPOINT
              value: ${SYSTEM_B_MINIO_ENDPOINT}
            - name: MINIO_ACCESS_KEY
              value: ${MINIO_ACCESS_KEY}
            - name: MINIO_SECRET_KEY
              value: ${MINIO_SECRET_KEY}
            - name: MINIO_BUCKET
              value: demo-artifacts
            - name: BEARER_TOKEN
              value: ${CONTROL_PLANE_TOKEN}
            - name: CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: CONTROL_PLANE_TOKEN
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - mountPath: /etc/system-b
              name: system-b-kubeconfig
              readOnly: true
      volumes:
        - name: system-b-kubeconfig
          secret:
            secretName: system-b-kubeconfig
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: platform
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-nodeport
  namespace: platform
spec:
  selector:
    app: control-plane
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31000
