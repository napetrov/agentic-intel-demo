# Minimal offload-relay control-plane for System A.
#
# Implements docs/contracts/offload-result-contract.md:
#   POST /offload, GET /offload/{job_id}, GET /artifacts/{ref}.
#
# This is the shape exercised by the `tier1-scenario-slice` CI job and by
# Tier 1 local docker bring-up. For Tier 2 session management we rely on
# the OpenClaw operator — this manifest deliberately does NOT recreate the
# old k8s-backed sessions API.
#
# Required substitutions (envsubst or equivalent) before `kubectl apply`:
#   CONTROL_OFFLOAD_IMAGE — versioned tag or digest of the
#                           control-plane offload image, e.g.
#                           docker.io/myorg/demo-control-plane:v0.1.0 or
#                           myregistry/demo-control-plane@sha256:...
#                           Avoid ":latest" for reproducibility.
#   OFFLOAD_WORKER_URL    — reachable URL of the offload-worker HTTP API.
#                           In a single-cluster setup this can be
#                           http://offload-worker.system-b.svc.cluster.local:8080;
#                           in the two-cluster Tier 2 topology it MUST point
#                           at the offload-worker NodePort / ingress on
#                           System B (e.g. http://<system-b-node>:30800).
#   SYSTEM_B_MINIO_ENDPOINT — reachable URL of MinIO on System B. Same
#                           single-cluster vs. two-cluster note as above
#                           (see k8s/system-b/minio.yaml NodePort 30900).
#   OPENCLAW_GATEWAY_URL — reachable URL of the agent gateway / agent-stub.
#                           In the two-cluster Tier 2 topology this points at
#                           System B's agent-stub NodePort (see
#                           k8s/system-b/agent-stub.yaml).
#   MINIO_ACCESS_KEY / MINIO_SECRET_KEY — MinIO creds shared with
#                           System B's minio-creds secret. Kubernetes does
#                           not allow cross-namespace secretRefs, so the
#                           secret is declared locally in this manifest.
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: platform
type: Opaque
stringData:
  MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
  MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-offload
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane-offload
  template:
    metadata:
      labels:
        app: control-plane-offload
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane-offload
          image: ${CONTROL_OFFLOAD_IMAGE}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OFFLOAD_WORKER_URL
              value: ${OFFLOAD_WORKER_URL}
            - name: OFFLOAD_TIMEOUT_SECONDS
              value: "60"
            - name: OPENCLAW_GATEWAY_URL
              value: ${OPENCLAW_GATEWAY_URL}
            - name: OPENCLAW_PROBE_PATH
              value: "/health"
            - name: MINIO_ENDPOINT
              value: ${SYSTEM_B_MINIO_ENDPOINT}
            - name: MINIO_BUCKET
              value: "demo-artifacts"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: MINIO_ROOT_PASSWORD
            - name: PRESIGN_EXPIRES_SECONDS
              value: "900"
          # /ready pings the offload-worker upstream; k8s won't route
          # traffic to this pod until the relay can actually forward.
          # /health is a plain process-up probe used for liveness only.
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-offload
  namespace: platform
spec:
  selector:
    app: control-plane-offload
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-offload-nodeport
  namespace: platform
spec:
  selector:
    app: control-plane-offload
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31001
